name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels an in-flight run on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel (1.97), the wasm target, and the
      # rustfmt/clippy components. `rustup show` stopped installing the toolchain
      # in rustup 1.28, so install it explicitly; a bare install has handled the
      # toml's target/components inconsistently across rustup versions, so add them
      # directly too — a no-op when they are already present.
      - name: Install pinned toolchain
        run: |
          rustup toolchain install
          rustup target add wasm32-unknown-unknown
          rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (native)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (wasm)
        run: cargo clippy -p blindfold-web --target wasm32-unknown-unknown -- -D warnings

      - name: Test
        run: cargo test --workspace

  e2e:
    name: browser reveal test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # As in the check job: rustup 1.28 no longer installs the pinned toolchain
      # via `rustup show`. This job only builds wasm, so it needs the wasm target.
      - name: Install pinned toolchain
        run: |
          rustup toolchain install
          rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # The prebuilt binary, not `cargo install trunk`, which would compile it
      # from source every run. trunk itself downloads wasm-bindgen and wasm-opt on
      # first build. Pinned to the version used in development.
      - name: Install trunk
        run: |
          curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xzf - -C "$HOME/.cargo/bin"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/blindfold-web/package-lock.json

      - name: Install browser test dependencies
        working-directory: crates/blindfold-web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Build the release bundle in its own step so the cold compile (release wasm
      # of the whole dep tree, plus trunk fetching wasm-bindgen and running
      # wasm-opt) is not racing Playwright's webServer startup timeout — a webServer
      # timeout is a hard job failure and, unlike a spec, is not retried. The
      # config's own `trunk build` then reuses the cached compile and returns
      # quickly (at worst re-running wasm-bindgen/wasm-opt), well inside its timeout.
      - name: Build release bundle
        working-directory: crates/blindfold-web
        run: trunk build --release

      - name: Run browser reveal test
        working-directory: crates/blindfold-web
        run: npm test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: crates/blindfold-web/playwright-report/
          retention-days: 7

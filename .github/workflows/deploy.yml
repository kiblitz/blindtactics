name: Deploy to GitHub Pages

# Build the static site on a push to `main` and publish it to GitHub Pages via the
# official Pages actions — no `deploy` branch, no third-party host. Pages serves the
# uploaded artifact directly and supports a custom domain (set in repo Settings →
# Pages, which persists across Actions deploys).
#
# **Deliberately ungated**, as the Netlify pipeline was: this does not wait on the
# `check` / `e2e` jobs, so a push that compiles ships even if a test would fail — the
# lower-scrutiny working agreement for this repo. It only *builds*; correctness is
# CI's job.
on:
  push:
    branches: [main]
  workflow_dispatch:

# The permissions the Pages deploy needs: read the repo, write a Pages deployment, and
# mint the OIDC token `deploy-pages` uses to authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # The deployment's URL is surfaced on the job and in the Environments tab.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      # The same toolchain install the CI jobs use: rust-toolchain.toml pins the
      # channel (1.97) and rustfmt/clippy, but `rustup show` stopped installing the
      # toolchain in rustup 1.28, and this job also needs the wasm target.
      - name: Install pinned toolchain
        run: |
          rustup toolchain install
          rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # The prebuilt binary rather than `cargo install trunk` (which recompiles it
      # from source every run). Pinned to the version CI builds with; trunk fetches
      # wasm-bindgen and wasm-opt itself on first build.
      - name: Install trunk
        run: |
          curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xzf - -C "$HOME/.cargo/bin"

      # Trunk.toml sets public_url = "./", so the bundle's asset links are relative and
      # serve correctly both from a project subpath (`user.github.io/repo/`) and from a
      # custom domain's root. Output lands in crates/blindfold-web/dist.
      - name: Build site
        working-directory: crates/blindfold-web
        run: trunk build --release

      # Package dist/ as a Pages artifact and hand it to the Pages deployment.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: crates/blindfold-web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
